name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Lint
        run: bunx @biomejs/biome check .
      - name: Type-check
        run: bunx tsc --noEmit -p packages/api/tsconfig.json
      - name: Unit tests
        run: bun test src/__tests__/unit
        working-directory: packages/api
      - name: Integration tests
        run: bun test src/__tests__/integration
        working-directory: packages/api
      - name: Route tests
        run: bun test src/__tests__/routes
        working-directory: packages/api
      - name: Build Dashboard
        run: bun run build
        working-directory: apps/dashboard
      - name: Build Site
        run: bun run build
        working-directory: site
